<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login</title>

  <!-- Use Inter properly -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../css/login.css">
  <script type="module" src="../js/login.js"></script>
</head>

<body>
  <div class="left">

    <!-- Background Images -->
    <img src="../assets/images/1.png" class="bg-img bg1">
    <img src="../assets/images/2.png" class="bg-img bg2">

    <!-- Logo -->
    <img src="../assets/logo/supreme1.png  " id="logo" alt="School Logo">

    <!-- Login Box -->
    <div class="login-box">
      <h3>Sign In</h3>

      <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" placeholder="Enter Username">
      </div>

      <div class="form-group">
        <label>Password</label>
        <div class="password-wrapper">
          <input type="password" id="password" placeholder="Enter Password">
          <img src="../assets/icons/closeEye.png" alt="Toggle Password" class="toggle-password" onclick="togglePassword()">
        </div>
      </div>

      <button onclick="login()">Sign In</button>
    </div>

  </div>
</body>
</html>
